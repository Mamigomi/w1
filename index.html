<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>2025년 6월 고1 모의고사 어휘 배틀 게임</title>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#0b1220;
  color:#fff;
  font-family:system-ui, -apple-system, "Noto Sans KR", sans-serif;
  overflow:hidden;
  user-select:none;
  touch-action:manipulation;
}

#wrap{
  max-width:480px;
  margin:0 auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(to bottom, #0b1220, #101827);
}

header{
  padding:18px 16px 10px;
  text-align:center;
}

#title{
  font-size:22px;
  font-weight:900;
}

#subtitle{
  margin-top:6px;
  font-size:13px;
  opacity:.8;
}

#battle{
  padding:10px 18px;
}

.enemy,
.player{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.character{
  font-size:28px;
}

.blocks{
  display:flex;
  gap:6px;
}

.block{
  width:22px;
  height:22px;
  border-radius:5px;
}

.enemyBlock{
  background:#ff4d7a;
  box-shadow:0 0 12px rgba(255,77,122,.6);
}

.playerBlock{
  background:#4d8dff;
  box-shadow:0 0 12px rgba(77,141,255,.6);
}

.dead{
  opacity:.18;
  filter:grayscale(1);
}

#wordArea{
  margin-top:26px;
  text-align:center;
}

#english{
  font-size:30px;
  font-weight:900;
  letter-spacing:1px;
}

#progress{
  margin-top:10px;
  font-size:14px;
  opacity:.7;
}

#laneWrap{
  position:relative;
  flex:1;
  overflow:hidden;
  margin-top:30px;
}

#lane{
  position:absolute;
  left:-100%;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  gap:14px;
  white-space:nowrap;
}

.choice{
  min-width:130px;
  padding:18px 14px;
  border-radius:16px;
  background:#1e293b;
  border:1px solid rgba(255,255,255,.08);
  text-align:center;
  font-size:20px;
  font-weight:800;
  box-shadow:0 10px 25px rgba(0,0,0,.35);
  cursor:pointer;
  transition:.12s;
}

.choice:active{
  transform:scale(.95);
}

.good{
  background:#065f46 !important;
}

.bad{
  background:#7f1d1d !important;
}

#message{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:42px;
  font-weight:900;
  pointer-events:none;
  opacity:0;
}

.hit{
  color:#5eead4;
  text-shadow:0 0 18px rgba(94,234,212,.8);
}

.wrong{
  color:#ff6b81;
  text-shadow:0 0 18px rgba(255,107,129,.8);
}

.show{
  animation:pop .7s;
}

@keyframes pop{
  0%{
    opacity:0;
    transform:translate(-50%, -50%) scale(.6);
  }
  20%{
    opacity:1;
    transform:translate(-50%, -50%) scale(1.2);
  }
  100%{
    opacity:0;
    transform:translate(-50%, -50%) scale(1);
  }
}

.shake{
  animation:shake .35s;
}

@keyframes shake{
  0%{ transform:translateX(-8px); }
  25%{ transform:translateX(8px); }
  50%{ transform:translateX(-8px); }
  75%{ transform:translateX(8px); }
  100%{ transform:translateX(0); }
}

#overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
  padding:20px;
}

.card{
  width:100%;
  max-width:420px;
  background:#111a2b;
  border-radius:20px;
  padding:24px;
  text-align:center;
  border:1px solid rgba(255,255,255,.08);
}

.card h2{
  margin:0;
  font-size:24px;
}

.card p{
  margin-top:14px;
  line-height:1.6;
  opacity:.9;
}

button{
  width:100%;
  margin-top:18px;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#38bdf8;
  font-size:17px;
  font-weight:900;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="wrap">

<header>
  <div id="title">2025년 6월 고1 모의고사 어휘 배틀 게임</div>
  <div id="subtitle">정답을 맞혀 적의 블록을 모두 파괴하세요</div>
</header>

<div id="battle">

  <div class="enemy">
    <div class="character">👹</div>
    <div class="blocks" id="enemyBlocks"></div>
  </div>

  <div id="wordArea">
    <div id="english">ENGLISH WORD</div>
    <div id="progress"></div>
  </div>

</div>

<div id="laneWrap">
  <div id="lane"></div>
  <div id="message"></div>
</div>

<div id="battle" style="padding-bottom:30px;">

  <div class="player">
    <div class="character" id="playerFace">😠</div>
    <div class="blocks" id="playerBlocks"></div>
  </div>

</div>

</div>

<div id="overlay">
  <div class="card">
    <h2>어휘 배틀 시작</h2>

    <p>
      영어 단어의 뜻을 빠르게 맞히세요.<br><br>
      정답 → 적 블록 파괴<br>
      오답 또는 시간초과 → 내 블록 파괴
    </p>

    <button id="startBtn">게임 시작</button>
  </div>
</div>

<script>

const words = [
{en:"wait",ko:"기다리다"},
{en:"wait in line",ko:"줄을 서서 기다리다"},
{en:"check in",ko:"탑승 수속하다"},
{en:"flight",ko:"비행기, 항공편"},
{en:"expectation",ko:"기대"},
{en:"European",ko:"유럽의"},
{en:"backpacking trip",ko:"배낭여행"},
{en:"really",ko:"정말로"},
{en:"high",ko:"높은"},
{en:"look forward to",ko:"~을 손꼽아 기다리다"},
{en:"trip",ko:"여행"},
{en:"year",ko:"1년"},
{en:"can’t wait to",ko:"빨리 ~하고 싶다"},
{en:"visit",ko:"방문하다"},
{en:"museum",ko:"박물관"},
{en:"see",ko:"보다"},
{en:"Eiffel Tower",ko:"에펠탑"},
{en:"at night",ko:"밤에"},
{en:"stand",ko:"서 있다"},
{en:"feel",ko:"느끼다"},
{en:"experience",ko:"경험"},
{en:"finally",ko:"마침내"},
{en:"close",ko:"가까운"},
{en:"approach",ko:"다가가다"},
{en:"counter",ko:"카운터"},
{en:"airline",ko:"항공사"},
{en:"employee",ko:"직원"},
{en:"ask",ko:"요청하다, 묻다"},
{en:"passport",ko:"여권"},
{en:"reach into",ko:"~에 손을 넣다"},
{en:"pocket",ko:"주머니"},
{en:"nothing",ko:"아무것도 없음"},
{en:"realize",ko:"깨닫다"},
{en:"leave",ko:"두고 오다"},
{en:"at home",ko:"집에"},
{en:"plan",ko:"계획"},
{en:"ruin",ko:"망치다"},
{en:"heartbroken",ko:"상심한"},
{en:"know",ko:"알다"},
{en:"board",ko:"탑승하다"},
{en:"delay",ko:"연기하다"},
{en:"dream trip",ko:"꿈의 여행"}
];

const englishEl = document.getElementById("english");
const progressEl = document.getElementById("progress");
const lane = document.getElementById("lane");
const message = document.getElementById("message");

const playerBlocksEl = document.getElementById("playerBlocks");
const enemyBlocksEl = document.getElementById("enemyBlocks");

const playerFace = document.getElementById("playerFace");

const overlay = document.getElementById("overlay");
const startBtn = document.getElementById("startBtn");

let playerLives = 5;
let enemyLives = 5;

let currentIndex = 0;
let currentWord = null;

let laneX = -1000;
let speed = 2.4;

let running = false;
let answered = false;

function shuffle(arr){
  return [...arr].sort(() => Math.random() - 0.5);
}

function renderBlocks(){

  playerBlocksEl.innerHTML = "";
  enemyBlocksEl.innerHTML = "";

  for(let i=0;i<5;i++){

    const p = document.createElement("div");
    p.className = "block playerBlock";
    if(i >= playerLives) p.classList.add("dead");
    playerBlocksEl.appendChild(p);

    const e = document.createElement("div");
    e.className = "block enemyBlock";
    if(i >= enemyLives) e.classList.add("dead");
    enemyBlocksEl.appendChild(e);
  }

  if(playerLives >= 4){
    playerFace.textContent = "😠";
  }else if(playerLives >= 2){
    playerFace.textContent = "😣";
  }else{
    playerFace.textContent = "💀";
  }
}

function showMessage(txt, cls){

  message.textContent = txt;
  message.className = "";
  message.classList.add(cls);
  message.classList.add("show");

  setTimeout(() => {
    message.className = "";
  }, 700);
}

function nextQuestion(){

  if(playerLives <= 0){
    gameOver(false);
    return;
  }

  if(enemyLives <= 0){
    gameOver(true);
    return;
  }

  if(currentIndex >= words.length){
    gameOver(true);
    return;
  }

  answered = false;

  currentWord = words[currentIndex];

  englishEl.textContent = currentWord.en;

  progressEl.textContent =
    `${currentIndex + 1} / ${words.length}`;

  lane.innerHTML = "";

  const wrongs = shuffle(
    words
      .map(v => v.ko)
      .filter(v => v !== currentWord.ko)
  ).slice(0,3);

  const options = shuffle([
    currentWord.ko,
    ...wrongs
  ]);

  options.forEach(opt => {

    const div = document.createElement("div");
    div.className = "choice";
    div.textContent = opt;

    div.onclick = () => {

      if(answered) return;

      answered = true;

      if(opt === currentWord.ko){

        div.classList.add("good");

        enemyLives--;

        renderBlocks();

        showMessage("HIT!", "hit");

      }else{

        div.classList.add("bad");

        playerLives--;

        renderBlocks();

        document.body.classList.add("shake");

        setTimeout(() => {
          document.body.classList.remove("shake");
        }, 350);

        showMessage("WRONG!", "wrong");
      }

      currentIndex++;

      setTimeout(() => {
        nextQuestion();
      }, 650);
    };

    lane.appendChild(div);

  });

  laneX = -lane.offsetWidth;
}

function gameLoop(){

  if(!running) return;

  laneX += speed;

  lane.style.left = laneX + "px";

  const limit =
    window.innerWidth + 60;

  if(laneX > limit && !answered){

    answered = true;

    playerLives--;

    renderBlocks();

    document.body.classList.add("shake");

    setTimeout(() => {
      document.body.classList.remove("shake");
    }, 350);

    showMessage("TOO LATE!", "wrong");

    currentIndex++;

    setTimeout(() => {
      nextQuestion();
    }, 700);
  }

  requestAnimationFrame(gameLoop);
}

function gameOver(win){

  running = false;

  overlay.style.display = "flex";

  overlay.innerHTML = `
    <div class="card">
      <h2>${win ? "승리!" : "패배!"}</h2>

      <p>
        ${
          win
          ? "적의 블록을 모두 파괴했습니다."
          : "모든 블록이 파괴되었습니다."
        }
      </p>

      <button onclick="restartGame()">
        다시 시작
      </button>
    </div>
  `;
}

function restartGame(){

  playerLives = 5;
  enemyLives = 5;

  currentIndex = 0;

  renderBlocks();

  overlay.style.display = "none";

  nextQuestion();

  running = true;

  requestAnimationFrame(gameLoop);
}

startBtn.onclick = () => {

  overlay.style.display = "none";

  renderBlocks();

  nextQuestion();

  running = true;

  requestAnimationFrame(gameLoop);
};

</script>

</body>
</html>
