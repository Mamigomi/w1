<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background:
    radial-gradient(circle at top, rgba(59, 130, 246, 0.2), transparent 36%),
    linear-gradient(180deg, #081120 0%, #101a31 55%, #0d1528 100%);
  color: #f8fbff;
  font-family: "Pretendard", "Noto Sans KR", system-ui, sans-serif;
  overflow: hidden;
  user-select: none;
  touch-action: manipulation;
}

#wrap {
  max-width: 560px;
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 0 14px 14px;
}

header {
  padding: 18px 10px 8px;
  text-align: center;
}

#title {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.02em;
}

#subtitle {
  margin-top: 8px;
  font-size: 14px;
  color: rgba(232, 242, 255, 0.82);
  line-height: 1.45;
}

#statusCard {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  padding: 14px 16px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 20px;
  background: rgba(11, 20, 40, 0.72);
  backdrop-filter: blur(10px);
}

#statusText {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.label {
  font-size: 12px;
  color: rgba(225, 235, 247, 0.72);
}

#progressText {
  font-size: 18px;
  font-weight: 800;
}

#lifeWrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

.life {
  width: 18px;
  height: 18px;
  border-radius: 999px;
  background: linear-gradient(180deg, #60a5fa, #2563eb);
  box-shadow: 0 0 12px rgba(37, 99, 235, 0.48);
}

.life.dead {
  opacity: 0.18;
  filter: grayscale(1);
  box-shadow: none;
}

#meter {
  width: 110px;
  height: 110px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 35%, rgba(255,255,255,0.22), transparent 34%),
    conic-gradient(#22c55e var(--meter, 0%), rgba(255,255,255,0.08) 0%);
  position: relative;
}

#meter::after {
  content: "";
  position: absolute;
  inset: 11px;
  border-radius: 50%;
  background: #0d1730;
}

#meterValue {
  position: relative;
  z-index: 1;
  font-size: 18px;
  font-weight: 900;
}

#wordCard {
  margin-top: 18px;
  padding: 24px 18px 20px;
  border-radius: 24px;
  background: linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(20, 31, 58, 0.9));
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 18px 40px rgba(0,0,0,0.28);
  text-align: center;
}

#english {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: 0.01em;
  word-break: keep-all;
}

#hint {
  margin-top: 12px;
  font-size: 13px;
  color: rgba(220, 230, 243, 0.76);
}

#laneWrap {
  position: relative;
  flex: 1;
  overflow: hidden;
  margin-top: 22px;
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.06);
  background:
    linear-gradient(180deg, rgba(12, 19, 36, 0.74), rgba(10, 16, 31, 0.92)),
    repeating-linear-gradient(90deg, transparent 0, transparent 38px, rgba(255,255,255,0.03) 38px, rgba(255,255,255,0.03) 40px);
}

#lane {
  position: absolute;
  left: -100%;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  gap: 14px;
  white-space: nowrap;
  padding: 0 14px;
}

.choice {
  min-width: 150px;
  max-width: 220px;
  padding: 18px 14px;
  border-radius: 18px;
  background: linear-gradient(180deg, #1d4ed8, #1e40af);
  border: 1px solid rgba(255,255,255,0.14);
  text-align: center;
  font-size: 19px;
  font-weight: 800;
  line-height: 1.35;
  box-shadow: 0 14px 28px rgba(0,0,0,0.28);
  cursor: pointer;
  transition: transform 0.12s ease, filter 0.12s ease;
}

.choice:active {
  transform: scale(0.96);
}

.good {
  background: linear-gradient(180deg, #16a34a, #166534) !important;
}

.bad {
  background: linear-gradient(180deg, #ef4444, #991b1b) !important;
}

#message {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 42px;
  font-weight: 900;
  pointer-events: none;
  opacity: 0;
  text-align: center;
}

.hit {
  color: #5eead4;
  text-shadow: 0 0 18px rgba(94, 234, 212, 0.8);
}

.wrong {
  color: #ff8da1;
  text-shadow: 0 0 18px rgba(255, 141, 161, 0.8);
}

.show {
  animation: pop 0.7s;
}

@keyframes pop {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.6);
  }
  20% {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.14);
  }
  100% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(1);
  }
}

.shake {
  animation: shake 0.35s;
}

@keyframes shake {
  0% { transform: translateX(-8px); }
  25% { transform: translateX(8px); }
  50% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
  100% { transform: translateX(0); }
}

#overlay {
  position: fixed;
  inset: 0;
  background: rgba(4, 10, 24, 0.84);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 430px;
  background: linear-gradient(180deg, #101b33, #0b1428);
  border-radius: 24px;
  padding: 26px 22px 22px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 24px 50px rgba(0,0,0,0.34);
}

.card h2 {
  margin: 0;
  font-size: 26px;
}

.card p {
  margin: 14px 0 0;
  line-height: 1.7;
  color: rgba(234, 241, 250, 0.88);
}

button {
  width: 100%;
  margin-top: 18px;
  padding: 16px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(180deg, #38bdf8, #2563eb);
  color: white;
  font-size: 17px;
  font-weight: 900;
  cursor: pointer;
}

@media (max-width: 480px) {
  #wrap {
    padding: 0 10px 10px;
  }

  #title {
    font-size: 21px;
  }

  #statusCard {
    grid-template-columns: 1fr;
    justify-items: center;

  }

  #english {
    font-size: 28px;
  }

  .choice {
    min-width: 138px;
    font-size: 17px;
  }
}
</style>

const MAX_LIVES = 5;
const QUESTION_DELAY = 700;

const englishEl = document.getElementById("english");
const progressTextEl = document.getElementById("progressText");
const lane = document.getElementById("lane");
const message = document.getElementById("message");
const lifeWrap = document.getElementById("lifeWrap");
const meter = document.getElementById("meter");
const meterValue = document.getElementById("meterValue");
const overlay = document.getElementById("overlay");
const startBtn = document.getElementById("startBtn");

let playerLives = MAX_LIVES;
let currentIndex = 0;
let currentWord = null;
let quizWords = [];
let laneX = -1000;
let speed = 2.8;
let running = false;
let answered = false;

function shuffle(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function updateHud() {
  lifeWrap.innerHTML = "";
  for (let i = 0; i < MAX_LIVES; i++) {
    const life = document.createElement("div");
    life.className = "life";
    if (i >= playerLives) {
      life.classList.add("dead");
    }
    lifeWrap.appendChild(life);
  }

  progressTextEl.textContent = `${currentIndex} / ${quizWords.length}`;

  const percent = quizWords.length
    ? Math.round((currentIndex / quizWords.length) * 100)
    : 0;
  meter.style.setProperty("--meter", `${percent}%`);
  meterValue.textContent = `${percent}%`;
}

function showMessage(text, cls) {
  message.textContent = text;
  message.className = "";
  message.classList.add(cls, "show");
  setTimeout(() => {
    message.className = "";
  }, 700);
}

function nextQuestion() {
  if (playerLives <= 0) {
    gameOver(false);
    return;
  }

  if (currentIndex >= quizWords.length) {
    gameOver(true);
    return;
  }

  answered = false;
  currentWord = quizWords[currentIndex];
  englishEl.textContent = currentWord.en;
  updateHud();

  const wrongs = shuffle(
    words
      .map((item) => item.ko)
      .filter((ko) => ko !== currentWord.ko)
  ).slice(0, 3);

  const options = shuffle([currentWord.ko, ...wrongs]);
  lane.innerHTML = "";

  options.forEach((option) => {
    const choice = document.createElement("div");
    choice.className = "choice";
    choice.textContent = option;

    choice.onclick = () => {
      if (answered) return;
      answered = true;

      if (option === currentWord.ko) {
        choice.classList.add("good");
        showMessage("HIT!", "hit");
      } else {
        choice.classList.add("bad");
        loseLife("WRONG!");
      }

      currentIndex += 1;
      updateHud();

      setTimeout(() => {
        nextQuestion();
      }, QUESTION_DELAY);
    };

    lane.appendChild(choice);
  });

  laneX = -lane.offsetWidth;
}

function loseLife(text) {
  playerLives -= 1;
  updateHud();
  document.body.classList.add("shake");
  setTimeout(() => {
    document.body.classList.remove("shake");
  }, 350);
  showMessage(text, "wrong");
}

function gameLoop() {
  if (!running) return;

  laneX += speed;
  lane.style.left = laneX + "px";

  const limit = window.innerWidth + 60;
  if (laneX > limit && !answered) {
    answered = true;
    currentIndex += 1;
    loseLife("TIME OVER");
    setTimeout(() => {
      nextQuestion();
    }, QUESTION_DELAY);
  }

  requestAnimationFrame(gameLoop);
}

function gameOver(win) {
  running = false;
  const solved = currentIndex;

  overlay.style.display = "flex";
  overlay.innerHTML = `
    <div class="card">
      <h2>${win ? "승리!" : "패배!"}</h2>
      <p>
        ${win
          ? "전체 어휘를 끝까지 클리어했습니다."
          : "목숨을 모두 잃었습니다."}<br><br>
        푼 문제: ${solved} / ${quizWords.length}
      </p>
      <button onclick="restartGame()">다시 시작</button>
    </div>
  `;
}

function restartGame() {
  playerLives = MAX_LIVES;
  currentIndex = 0;
  quizWords = shuffle(words);
  speed = quizWords.length > 220 ? 2.95 : 2.75;
  overlay.style.display = "none";
  updateHud();
  nextQuestion();
  running = true;
  requestAnimationFrame(gameLoop);
}

startBtn.onclick = () => {
  restartGame();
};

updateHud();
</script>
